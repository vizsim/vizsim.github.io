<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Seite nicht gefunden — vizsim</title>
  <meta name="description" content="Diese Seite gibt es nicht (mehr).">
  <meta name="robots" content="noindex">

  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌍</text></svg>">

  <style>
    :root {
      --paper: #ffffff;
      --ink: #1b1814;
      --muted: #6d665d;
      --accent: #9a3b2e;
      --rule: #e8e1d7;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--paper);
      color: var(--ink);
      font-family: Georgia, serif;
      font-size: 1.18rem;
      line-height: 1.7;
      min-height: 100dvh;
      display: grid;
      place-items: center;
      padding: clamp(1.5rem, 3vw, 2.5rem);
      text-align: center;
    }

    .eyebrow {
      font-size: 0.95rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 1rem;
    }

    h1 {
      font-weight: 500;
      font-size: clamp(2.6rem, 7vw, 4.5rem);
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 1.3rem;
    }

    p {
      color: var(--muted);
      max-width: 32rem;
      margin: 0 auto 2rem;
    }

    a {
      color: var(--ink);
      text-decoration: none;
      background-color: rgba(154, 59, 46, 0.1);
      padding: 0.04em 0.22em;
      border-radius: 0.3em;
      transition: color 0.25s ease, background-color 0.25s ease;
    }

    a:hover {
      color: var(--paper);
      background-color: var(--accent);
    }
  </style>
</head>

<body>
  <main>
    <p class="eyebrow">Fehler 404</p>
    <h1>Hier ist nichts.</h1>
    <p>Die Seite, die du suchst, gibt es nicht (mehr) — vielleicht ein alter Link oder ein Tippfehler.</p>
    <p><a href="/">← zurück zur Startseite</a></p>
  </main>
</body>
</html>
